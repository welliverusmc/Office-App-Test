<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOA Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-label">LOA TRACKER</div>
    <h1 id="dayTitle">Counter</h1>
  </header>

  <main class="counter-grid">
    <section class="counter-card" data-key="pitches"><h2>Pitches</h2><div class="count" id="pitches">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
    <section class="counter-card" data-key="stories"><h2>Stories</h2><div class="count" id="stories">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
    <section class="counter-card" data-key="value"><h2>Value</h2><div class="count" id="value">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
    <section class="counter-card" data-key="tables"><h2>Tables</h2><div class="count" id="tables">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
    <section class="counter-card" data-key="ccs"><h2>CCs</h2><div class="count" id="ccs">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
    <section class="counter-card" data-key="closes"><h2>Closes</h2><div class="count" id="closes">0</div><div class="button-row"><button class="counter-btn" data-action="minus">−</button><button class="counter-btn" data-action="plus">+</button></div></section>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOA Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
<div class="label">LOA TRACKER</div>
<h1 id="dayName">Tuesday</h1>
<div id="dateText" class="date"></div>
</header>

<div class="card pitches"><span>⚾ Pitches</span><span id="pitches">0</span><div><button>-</button><button>+</button></div></div>
<div class="card stories"><span>📖 Short Stories</span><span id="stories">0</span><div><button>-</button><button>+</button></div></div>
<div class="card value"><span>💎 Value Statements</span><span id="value">0</span><div><button>-</button><button>+</button></div></div>
<div class="card tables"><span>🪑 Tables</span><span id="tables">0</span><div><button>-</button><button>+</button></div></div>
<div class="card credit"><span>💳 Credit Checks</span><span id="credit">0</span><div><button>-</button><button>+</button></div></div>
<div class="card closes"><span>🤝 Closes</span><span id="closes">0</span><div><button>-</button><button>+</button></div></div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOA Tracker</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="top-band">
    <p class="app-label">LOA TRACKER</p>
    <h1 id="day-title">Counter</h1>
  </header>

  <main class="counter-grid">
    <section class="counter-card" data-counter="pitches">
      <h2>Pitches</h2>
      <div class="counter-number" id="pitches-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one pitch">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one pitch">+</button>
      </div>
    </section>

    <section class="counter-card" data-counter="stories">
      <h2>Stories</h2>
      <div class="counter-number" id="stories-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one story">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one story">+</button>
      </div>
    </section>

    <section class="counter-card" data-counter="value">
      <h2>Value</h2>
      <div class="counter-number" id="value-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one value statement">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one value statement">+</button>
      </div>
    </section>

    <section class="counter-card" data-counter="tables">
      <h2>Tables</h2>
      <div class="counter-number" id="tables-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one table">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one table">+</button>
      </div>
    </section>

    <section class="counter-card" data-counter="ccs">
      <h2>CCs</h2>
      <div class="counter-number" id="ccs-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one CC">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one CC">+</button>
      </div>
    </section>

    <section class="counter-card" data-counter="closes">
      <h2>Closes</h2>
      <div class="counter-number" id="closes-count">0</div>
      <div class="button-row">
        <button class="counter-button" data-action="minus" aria-label="Subtract one close">−</button>
        <button class="counter-button" data-action="plus" aria-label="Add one close">+</button>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>

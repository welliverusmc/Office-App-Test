<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOA Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title">LOA TRACKER</div>
      <h1 id="dayName">Today</h1>
      <div id="dateText" class="date-text"></div>
    </header>

    <main class="tracker-list" aria-label="Daily LOA Tracker counters">
      <section class="tracker-card pitches" data-key="pitches">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">⚾</div>
          <h2>Pitches</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Pitches">−</button>
          <span class="count" id="pitches-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Pitches">+</button>
        </div>
      </section>

      <section class="tracker-card stories" data-key="shortStories">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">📖</div>
          <h2>Short Stories</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Short Stories">−</button>
          <span class="count" id="shortStories-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Short Stories">+</button>
        </div>
      </section>

      <section class="tracker-card value" data-key="valueStatements">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">💎</div>
          <h2>Value Statements</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Value Statements">−</button>
          <span class="count" id="valueStatements-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Value Statements">+</button>
        </div>
      </section>

      <section class="tracker-card tables" data-key="tables">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">🪑</div>
          <h2>Tables</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Tables">−</button>
          <span class="count" id="tables-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Tables">+</button>
        </div>
      </section>

      <section class="tracker-card credit" data-key="creditChecks">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">💳</div>
          <h2>Credit Checks</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Credit Checks">−</button>
          <span class="count" id="creditChecks-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Credit Checks">+</button>
        </div>
      </section>

      <section class="tracker-card closes" data-key="closes">
        <div class="tracker-left">
          <div class="icon" aria-hidden="true">🤝</div>
          <h2>Closes</h2>
        </div>
        <div class="controls">
          <button class="counter-btn" type="button" data-action="minus" aria-label="Decrease Closes">−</button>
          <span class="count" id="closes-count">0</span>
          <button class="counter-btn" type="button" data-action="plus" aria-label="Increase Closes">+</button>
        </div>
      </section>
    </main>

    <footer class="reset-footer">
      <button id="resetAll" class="reset-button" type="button" aria-label="Reset all counters">↻ RESET ALL</button>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
